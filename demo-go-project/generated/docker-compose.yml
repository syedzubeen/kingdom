services:
  demo-project:
    build:
      context: ..
      dockerfile: generated/Dockerfile
    ports:
      - "8080:8080"
    environment:
      APP_ENV: ${APP_ENV:-}
      DB_HOST: ${DB_HOST:-}
      DB_NAME: ${DB_NAME:-}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_PORT: ${DB_PORT:-}
      DB_USER: ${DB_USER:-}
      LOG_LEVEL: ${LOG_LEVEL:-}
      PORT: ${PORT:-}
      REDIS_URL: ${REDIS_URL:-}
